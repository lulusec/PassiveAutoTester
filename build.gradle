plugins {
    id 'java'
}

group = 'com.autotest'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    // Check https://mvnrepository.com/artifact/net.portswigger.burp.extensions/montoya-api for the latest version
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2023.12.1'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // Runtime deps are compile-only (Montoya API is provided by Burp at runtime)
    // If you add any true runtime dependencies, include them here:
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
